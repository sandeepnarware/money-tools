<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27%3E%3Ctext y=%27.9em%27 font-size=%2790%27 fill=%27%2316a34a%27%3E%24%3C/text%3E%3C/svg%3E">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stock Tax Calculator - Money Tools</title>
  <link rel="stylesheet" href="../../css/style.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1>Stock Tax Calculator</h1>
      <p>Calculate capital gains tax on your stock investments.</p>
    </div>
  </header>

  <main class="calculator-page">
    <div class="breadcrumb">
      <a href="../../">Home</a> &rsaquo; Stock Tax Calculator
    </div>

    <div class="calc-card">
      <h2>Stock Details</h2>
      <form id="stockTaxForm">
        <div class="form-group">
          <label for="stockCategory">Stocks Category</label>
          <div class="input-wrapper">
            <select id="stockCategory" style="width:100%; padding:8px; border:1px solid #d1d5db; border-radius:6px;">
              <option value="Listed">Listed Equity</option>
              <option value="Unlisted">Unlisted Equity</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="purchasePrice">Purchase Price per Share</label>
            <div class="input-wrapper">
              <input type="number" id="purchasePrice" required min="0" step="10" value="100">
              <span class="suffix">&#8377;</span>
            </div>
          </div>
          <div class="form-group">
            <label for="salePrice">Sale Price per Share</label>
            <div class="input-wrapper">
              <input type="number" id="salePrice" required min="0" step="10" value="200">
              <span class="suffix">&#8377;</span>
            </div>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="numShares">Number of Shares</label>
            <div class="input-wrapper">
              <input type="number" id="numShares" required min="1" step="10" value="100">
              <span class="suffix">Shares</span>
            </div>
          </div>
          <div class="form-group">
            <label for="stockPurchaseYear">Purchase Year</label>
            <div class="input-wrapper">
              <select id="stockPurchaseYear" style="width:100%; padding:8px; border:1px solid #d1d5db; border-radius:6px;"></select>
            </div>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="stockSaleYear">Sale Year</label>
            <div class="input-wrapper">
              <select id="stockSaleYear" style="width:100%; padding:8px; border:1px solid #d1d5db; border-radius:6px;"></select>
            </div>
          </div>
          <div class="form-group" style="display:flex; align-items:flex-end; padding-bottom:8px;">
            <label style="display:flex; align-items:center; gap:8px; cursor:pointer;">
              <input type="checkbox" id="stock30Bracket" checked>
              In 30% tax bracket?
            </label>
          </div>
        </div>

        <div style="display: flex; gap: 12px; margin-top: 8px;">
          <button type="submit" class="btn btn-primary">Calculate</button>
          <button type="reset" class="btn btn-secondary">Reset</button>
        </div>
      </form>
    </div>

    <div id="resultsSection" class="calc-card" style="display:none;">
      <h2>Tax Summary</h2>
      <div class="results-grid">
        <div class="result-item">
          <div class="label">Holding Period</div>
          <div class="value" id="resultSHoldingPeriod">0 years</div>
        </div>
        <div class="result-item">
          <div class="label">Total Gain</div>
          <div class="value" id="resultSGain">&#8377; 0</div>
        </div>
        <div class="result-item">
          <div class="label">Gain Type</div>
          <div class="value" id="resultSGainType">--</div>
        </div>
        <div class="result-item">
          <div class="label">Taxable Gain</div>
          <div class="value" id="resultSTaxableGain">&#8377; 0</div>
        </div>
        <div class="result-item">
          <div class="label">Tax Amount</div>
          <div class="value" id="resultSTaxAmount">&#8377; 0</div>
        </div>
      </div>

      <div class="chart-container">
        <canvas id="stockTaxChart" width="300" height="300"></canvas>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2026 Money Tools</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
