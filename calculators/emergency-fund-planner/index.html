<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27%3E%3Ctext y=%27.9em%27 font-size=%2790%27 fill=%27%230369a1%27%3E%24%3C/text%3E%3C/svg%3E">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emergency Fund Planner - Money Tools</title>
  <link rel="stylesheet" href="../../css/style.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1>Emergency Fund Planner</h1>
    </div>
  </header>

  <main class="calculator-page">
    <div class="breadcrumb">
      <a href="../../">Home</a> &rsaquo; Emergency Fund Planner
    </div>

    <div class="calc-card">
      <h2>Input Details</h2>
      <form id="efPlannerForm">
                <div class="form-group">
          <label for="monthlyExpenses">Monthly Essential Expenses</label>
          <div class="input-wrapper">
            <input type="number" id="monthlyExpenses" placeholder="e.g. 25000" required min="0" step="5000" value="25000">
            <span class="suffix">&#8377;</span>
          </div>
        </div>        <div class="form-group">
          <label for="currentSavings">Current Emergency Savings</label>
          <div class="input-wrapper">
            <input type="number" id="currentSavings" placeholder="e.g. 0" required min="0" step="5000" value="0">
            <span class="suffix">&#8377;</span>
          </div>
        </div>        <div class="form-group">
          <label for="monthlySave">Monthly Amount You Can Save</label>
          <div class="input-wrapper">
            <input type="number" id="monthlySave" placeholder="e.g. 5000" required min="0" step="1000" value="5000">
            <span class="suffix">&#8377;</span>
          </div>
        </div>        <div class="form-group">
          <label for="targetMonths">Target Months of Coverage</label>
          <div class="input-wrapper">
            <select id="targetMonths">
              <option value="3">3 months</option>
              <option value="6" selected>6 months</option>
              <option value="9">9 months</option>
              <option value="12">12 months</option>
            </select>
          </div>
        </div>
        <div style="display: flex; gap: 12px; margin-top: 8px;">
          <button type="submit" class="btn btn-primary">Calculate</button>
          <button type="reset" class="btn btn-secondary">Reset</button>
        </div>
      </form>
    </div>

    <div id="resultsSection" class="calc-card" style="display:none;">
      <h2>Results</h2>
      <div class="results-grid">
                <div class="result-item">
          <div class="label">Target Emergency Fund</div>
          <div class="value " id="resultTarget">&#8377; 0</div>
        </div>        <div class="result-item">
          <div class="label">Current Savings</div>
          <div class="value " id="resultCurrentEF">&#8377; 0</div>
        </div>        <div class="result-item">
          <div class="label">Monthly Savings Needed</div>
          <div class="value " id="resultMonthlyNeeded">&#8377; 0</div>
        </div>        <div class="result-item">
          <div class="label">Months to Reach Target</div>
          <div class="value " id="resultTimeEF">0</div>
        </div>        <div class="result-item">
          <div class="label">Progress</div>
          <div class="value " id="resultProgress">0</div>
        </div>
      </div>

      <div class="chart-container">
        <canvas id="efPlannerChart" width="300" height="300"></canvas>
      </div>
      
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2026 Money Tools</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
