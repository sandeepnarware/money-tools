<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27%3E%3Ctext y=%27.9em%27 font-size=%2790%27 fill=%27%2316a34a%27%3E%24%3C/text%3E%3C/svg%3E">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vehicle Insurance Comparison - Money Tools</title>
  <link rel="stylesheet" href="../../css/style.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1>Vehicle Insurance Comparison</h1>
      <p>Compare two insurance plans side by side.</p>
    </div>
  </header>

  <main class="calculator-page">
    <div class="breadcrumb">
      <a href="../../">Home</a> &rsaquo; Vehicle Insurance Comparison
    </div>

    <div class="calc-card">
      <h2>Plan Details</h2>
      <form id="vehicleInsForm">
        <div class="form-group">
          <label for="vehicleIDV">Vehicle IDV (Insured Declared Value)</label>
          <div class="input-wrapper">
            <input type="number" id="vehicleIDV" required min="1" step="50000" value="500000">
            <span class="suffix">&#8377;</span>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="premiumA">Plan A Premium</label>
            <div class="input-wrapper">
              <input type="number" id="premiumA" required min="0" step="1000" value="12000">
              <span class="suffix">&#8377;</span>
            </div>
          </div>
          <div class="form-group">
            <label for="addonsA">Plan A Add-ons</label>
            <div class="input-wrapper">
              <input type="number" id="addonsA" required min="0" step="500" value="3000">
              <span class="suffix">&#8377;</span>
            </div>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="premiumB">Plan B Premium</label>
            <div class="input-wrapper">
              <input type="number" id="premiumB" required min="0" step="1000" value="8000">
              <span class="suffix">&#8377;</span>
            </div>
          </div>
          <div class="form-group">
            <label for="addonsB">Plan B Add-ons</label>
            <div class="input-wrapper">
              <input type="number" id="addonsB" required min="0" step="500" value="1000">
              <span class="suffix">&#8377;</span>
            </div>
          </div>
        </div>

        <div class="form-group">
          <label for="ncbDiscount">NCB Discount</label>
          <div class="input-wrapper">
            <input type="number" id="ncbDiscount" required min="0" max="100" step="5" value="20">
            <span class="suffix">%</span>
          </div>
        </div>

        <div style="display: flex; gap: 12px; margin-top: 8px;">
          <button type="submit" class="btn btn-primary">Calculate</button>
          <button type="reset" class="btn btn-secondary">Reset</button>
        </div>
      </form>
    </div>

    <div id="resultsSection" class="calc-card" style="display:none;">
      <h2>Comparison Results</h2>
      <div class="results-grid results-grid-wide">
        <div class="result-item">
          <div class="label">Plan A Total Premium</div>
          <div class="value" id="resultTotalA">&#8377; 0</div>
        </div>
        <div class="result-item">
          <div class="label">Plan B Total Premium</div>
          <div class="value" id="resultTotalB">&#8377; 0</div>
        </div>
        <div class="result-item">
          <div class="label">Plan A Coverage %</div>
          <div class="value" id="resultCoverA">0%</div>
        </div>
        <div class="result-item">
          <div class="label">Plan B Coverage %</div>
          <div class="value" id="resultCoverB">0%</div>
        </div>
        <div class="result-item">
          <div class="label">Difference</div>
          <div class="value" id="resultDiff">&#8377; 0</div>
        </div>
        <div class="result-item">
          <div class="label">Better Value</div>
          <div class="value success" id="resultBetter">--</div>
        </div>
      </div>

      <div class="chart-container chart-container-wide">
        <canvas id="vehicleInsChart" width="400" height="300"></canvas>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2026 Money Tools</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
