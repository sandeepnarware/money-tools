<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27%3E%3Ctext y=%27.9em%27 font-size=%2790%27 fill=%27%2316a34a%27%3E%24%3C/text%3E%3C/svg%3E">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marriage Planning Calculator - Money Tools</title>
  <link rel="stylesheet" href="../../css/style.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1>Marriage Planning Calculator</h1>
    </div>
  </header>

  <main class="calculator-page">
    <div class="breadcrumb">
      <a href="../../">Home</a> &rsaquo; Marriage Planning Calculator
    </div>

    <div class="calc-card">
      <h2>Input Details</h2>
      <form id="marriageForm">
                <div class="form-group">
          <label for="currentAge">Current Age</label>
          <div class="input-wrapper">
            <input type="number" id="currentAge" placeholder="e.g. 25" required min="18" step="1" value="25">
            <span class="suffix">Yrs</span>
          </div>
        </div>        <div class="form-group">
          <label for="marriageAge">Planned Marriage Age</label>
          <div class="input-wrapper">
            <input type="number" id="marriageAge" placeholder="e.g. 28" required min="18" step="1" value="28">
            <span class="suffix">Yrs</span>
          </div>
        </div>        <div class="form-group">
          <label for="marriageCost">Estimated Marriage Cost</label>
          <div class="input-wrapper">
            <input type="number" id="marriageCost" placeholder="e.g. 2500000" required min="0" step="100000" value="2500000">
            <span class="suffix">&#8377;</span>
          </div>
        </div>        <div class="form-group">
          <label for="alreadySavedM">Already Saved</label>
          <div class="input-wrapper">
            <input type="number" id="alreadySavedM" placeholder="e.g. 100000" required min="0" step="50000" value="100000">
            <span class="suffix">&#8377;</span>
          </div>
        </div>        <div class="form-group">
          <label for="expectedReturnM">Expected Return %</label>
          <div class="input-wrapper">
            <input type="number" id="expectedReturnM" placeholder="e.g. 8" required min="0" step="0.5" value="8">
            <span class="suffix">%</span>
          </div>
        </div>        <div class="form-group">
          <label for="inflationRateM">Inflation Rate %</label>
          <div class="input-wrapper">
            <input type="number" id="inflationRateM" placeholder="e.g. 6" required min="0" step="0.5" value="6">
            <span class="suffix">%</span>
          </div>
        </div>
        <div style="display: flex; gap: 12px; margin-top: 8px;">
          <button type="submit" class="btn btn-primary">Calculate</button>
          <button type="reset" class="btn btn-secondary">Reset</button>
        </div>
      </form>
    </div>

    <div id="resultsSection" class="calc-card" style="display:none;">
      <h2>Results</h2>
      <div class="results-grid">
                <div class="result-item">
          <div class="label">Years to Plan</div>
          <div class="value " id="resultYearsM">0</div>
        </div>        <div class="result-item">
          <div class="label">Future Cost (Inflation-Adj.)</div>
          <div class="value " id="resultFutureCost">&#8377; 0</div>
        </div>        <div class="result-item">
          <div class="label">Total Needed</div>
          <div class="value " id="resultTotalNeededM">&#8377; 0</div>
        </div>        <div class="result-item">
          <div class="label">Monthly SIP Required</div>
          <div class="value " id="resultMonthlySIP">&#8377; 0</div>
        </div>        <div class="result-item">
          <div class="label">Already Saved (Future Value)</div>
          <div class="value " id="resultSavedFV">&#8377; 0</div>
        </div>
      </div>

      <div class="chart-container">
        <canvas id="marriageChart" width="300" height="300"></canvas>
      </div>
      
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2026 Money Tools</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
