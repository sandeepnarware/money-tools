<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27%3E%3Ctext y=%27.9em%27 font-size=%2790%27 fill=%27%230369a1%27%3E%24%3C/text%3E%3C/svg%3E">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gratuity Calculator - Money Tools</title>
  <link rel="stylesheet" href="../../css/style.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1>Gratuity Calculator</h1>
      <p>Calculate your gratuity amount and tax exemption.</p>
    </div>
  </header>

  <main class="calculator-page">
    <div class="breadcrumb">
      <a href="../../">Home</a> &rsaquo; Gratuity Calculator
    </div>

    <div class="calc-card">
      <h2>Employment Details</h2>
      <form id="gratuityForm">
        <div class="form-row">
          <div class="form-group">
            <label for="basicDa">Last Drawn Basic + DA</label>
            <div class="input-wrapper">
              <input type="number" id="basicDa" required min="1" step="5000" value="50000">
              <span class="suffix">&#8377;</span>
            </div>
          </div>
          <div class="form-group">
            <label for="serviceYears">Years of Service</label>
            <div class="input-wrapper">
              <input type="number" id="serviceYears" required min="5" max="45" step="1" value="15">
              <span class="suffix">Yrs</span>
            </div>
          </div>
        </div>

        <div class="form-group">
          <label for="applicableAct">Applicable Act</label>
          <div class="input-wrapper">
            <select id="applicableAct" style="width:100%; padding:8px; border:1px solid #d1d5db; border-radius:6px;">
              <option value="Act">Payment of Gratuity Act</option>
              <option value="Non-Act">Non-Act</option>
            </select>
          </div>
        </div>

        <div style="display: flex; gap: 12px; margin-top: 8px;">
          <button type="submit" class="btn btn-primary">Calculate</button>
          <button type="reset" class="btn btn-secondary">Reset</button>
        </div>
      </form>
    </div>

    <div id="resultsSection" class="calc-card" style="display:none;">
      <h2>Gratuity Summary</h2>
      <div class="results-grid">
        <div class="result-item">
          <div class="label">Gratuity Amount</div>
          <div class="value primary" id="resultGratuity">&#8377; 0</div>
        </div>
        <div class="result-item">
          <div class="label">Exempt Amount</div>
          <div class="value success" id="resultExempt">&#8377; 0</div>
        </div>
        <div class="result-item">
          <div class="label">Taxable Amount</div>
          <div class="value" id="resultTaxable">&#8377; 0</div>
        </div>
      </div>

      <div class="chart-container">
        <canvas id="gratuityChart" width="300" height="300"></canvas>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2026 Money Tools</p>
    </div>
  </footer>

  <script src="../../js/chart-tooltip.js"></script>
  <script src="script.js"></script>
</body>
</html>
