<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27%3E%3Ctext y=%27.9em%27 font-size=%2790%27 fill=%27%230369a1%27%3E%24%3C/text%3E%3C/svg%3E">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>House Purchase Planner - Money Tools</title>
  <link rel="stylesheet" href="../../css/style.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1>House Purchase Planner</h1>
    </div>
  </header>

  <main class="calculator-page">
    <div class="breadcrumb">
      <a href="../../">Home</a> &rsaquo; House Purchase Planner
    </div>

    <div class="calc-card">
      <h2>Input Details</h2>
      <form id="housePlannerForm">
                <div class="form-group">
          <label for="homePrice">Target Home Price</label>
          <div class="input-wrapper">
            <input type="number" id="homePrice" placeholder="e.g. 7500000" required min="0" step="100000" value="7500000">
            <span class="suffix">&#8377;</span>
          </div>
        </div>        <div class="form-group">
          <label for="downPaymentPct">Down Payment %</label>
          <div class="input-wrapper">
            <input type="number" id="downPaymentPct" placeholder="e.g. 20" required min="0" step="5" value="20" max="100">
            <span class="suffix">%</span>
          </div>
        </div>        <div class="form-group">
          <label for="alreadySavedH">Already Saved for Down Payment</label>
          <div class="input-wrapper">
            <input type="number" id="alreadySavedH" placeholder="e.g. 500000" required min="0" step="100000" value="500000">
            <span class="suffix">&#8377;</span>
          </div>
        </div>        <div class="form-group">
          <label for="monthlyCapacity">Monthly Savings Capacity</label>
          <div class="input-wrapper">
            <input type="number" id="monthlyCapacity" placeholder="e.g. 30000" required min="0" step="5000" value="30000">
            <span class="suffix">&#8377;</span>
          </div>
        </div>        <div class="form-group">
          <label for="expectedReturnH">Expected Return on Savings %</label>
          <div class="input-wrapper">
            <input type="number" id="expectedReturnH" placeholder="e.g. 8" required min="0" step="0.5" value="8">
            <span class="suffix">%</span>
          </div>
        </div>        <div class="form-group">
          <label for="targetYearsH">Target Years to Buy</label>
          <div class="input-wrapper">
            <input type="number" id="targetYearsH" placeholder="e.g. 5" required min="0" step="1" value="5" max="30">
            <span class="suffix">Yrs</span>
          </div>
        </div>
        <div style="display: flex; gap: 12px; margin-top: 8px;">
          <button type="submit" class="btn btn-primary">Calculate</button>
          <button type="reset" class="btn btn-secondary">Reset</button>
        </div>
      </form>
    </div>

    <div id="resultsSection" class="calc-card" style="display:none;">
      <h2>Results</h2>
      <div class="results-grid">
                <div class="result-item">
          <div class="label">Required Down Payment</div>
          <div class="value " id="resultDownPayment">&#8377; 0</div>
        </div>        <div class="result-item">
          <div class="label">Already Saved</div>
          <div class="value " id="resultSavedH">&#8377; 0</div>
        </div>        <div class="result-item">
          <div class="label">Monthly Savings Needed</div>
          <div class="value " id="resultMonthlyNeededH">&#8377; 0</div>
        </div>        <div class="result-item">
          <div class="label">Time to Save</div>
          <div class="value " id="resultTimeH">0</div>
        </div>        <div class="result-item">
          <div class="label">Will You Reach Target?</div>
          <div class="value " id="resultReachH">0</div>
        </div>
      </div>

      <div class="chart-container">
        <canvas id="housePlannerChart" width="300" height="300"></canvas>
      </div>
      
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2026 Money Tools</p>
    </div>
  </footer>

  <script src="../../js/chart-tooltip.js"></script>
  <script src="script.js"></script>
</body>
</html>
