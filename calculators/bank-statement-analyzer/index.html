<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27%3E%3Ctext y=%27.9em%27 font-size=%2790%27 fill=%27%2316a34a%27%3E%24%3C/text%3E%3C/svg%3E">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bank Statement Analyzer - Money Tools</title>
  <link rel="stylesheet" href="../../css/style.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1>Bank Statement Analyzer</h1>
    </div>
  </header>

  <main class="calculator-page">
    <div class="breadcrumb">
      <a href="../../">Home</a> &rsaquo; Bank Statement Analyzer
    </div>

    <div class="calc-card">
      <h2>Input Details</h2>
      <form id="bankStmtForm">
                <div class="form-group">
          <label for="monthlyIncomeB">Monthly Income</label>
          <div class="input-wrapper">
            <input type="number" id="monthlyIncomeB" placeholder="e.g. 60000" required min="0" step="5000" value="60000">
            <span class="suffix">&#8377;</span>
          </div>
        </div>        <div class="form-group">
          <label for="totalCredits">Total Credits Last Month</label>
          <div class="input-wrapper">
            <input type="number" id="totalCredits" placeholder="e.g. 65000" required min="0" step="5000" value="65000">
            <span class="suffix">&#8377;</span>
          </div>
        </div>        <div class="form-group">
          <label for="totalDebits">Total Debits Last Month</label>
          <div class="input-wrapper">
            <input type="number" id="totalDebits" placeholder="e.g. 55000" required min="0" step="5000" value="55000">
            <span class="suffix">&#8377;</span>
          </div>
        </div>        <div class="form-group">
          <label for="numTransactions">Number of Transactions</label>
          <div class="input-wrapper">
            <input type="number" id="numTransactions" placeholder="e.g. 30" required min="1" step="5" value="30">
            <span class="suffix"></span>
          </div>
        </div>        <div class="form-group">
          <label for="atmWithdrawals">Number of ATM Withdrawals</label>
          <div class="input-wrapper">
            <input type="number" id="atmWithdrawals" placeholder="e.g. 4" required min="0" step="1" value="4">
            <span class="suffix"></span>
          </div>
        </div>        <div class="form-group">
          <label for="bankBalance">Bank Balance</label>
          <div class="input-wrapper">
            <input type="number" id="bankBalance" placeholder="e.g. 25000" required min="0" step="5000" value="25000">
            <span class="suffix">&#8377;</span>
          </div>
        </div>        <div class="form-group">
          <label for="minBalance">Minimum Balance Maintained</label>
          <div class="input-wrapper">
            <input type="number" id="minBalance" placeholder="e.g. 10000" required min="0" step="1000" value="10000">
            <span class="suffix">&#8377;</span>
          </div>
        </div>
        <div style="display: flex; gap: 12px; margin-top: 8px;">
          <button type="submit" class="btn btn-primary">Calculate</button>
          <button type="reset" class="btn btn-secondary">Reset</button>
        </div>
      </form>
    </div>

    <div id="resultsSection" class="calc-card" style="display:none;">
      <h2>Results</h2>
      <div class="results-grid">
                <div class="result-item">
          <div class="label">Net Cash Flow</div>
          <div class="value " id="resultNetFlow">&#8377; 0</div>
        </div>        <div class="result-item">
          <div class="label">Average Transaction Size</div>
          <div class="value " id="resultAvgTx">&#8377; 0</div>
        </div>        <div class="result-item">
          <div class="label">ATM Withdrawal % of Debits</div>
          <div class="value " id="resultATMPct">0</div>
        </div>        <div class="result-item">
          <div class="label">Balance vs Min Balance</div>
          <div class="value " id="resultBalanceStatus">0</div>
        </div>        <div class="result-item">
          <div class="label">Savings Potential</div>
          <div class="value " id="resultSavingsPotential">&#8377; 0</div>
        </div>        <div class="result-item">
          <div class="label">Account Health</div>
          <div class="value " id="resultHealth">0</div>
        </div>
      </div>

      <div class="chart-container">
        <canvas id="bankStmtChart" width="300" height="300"></canvas>
      </div>
      
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2026 Money Tools</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
