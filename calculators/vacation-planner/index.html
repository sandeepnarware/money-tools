<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27%3E%3Ctext y=%27.9em%27 font-size=%2790%27 fill=%27%230369a1%27%3E%24%3C/text%3E%3C/svg%3E">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vacation Savings Planner - Money Tools</title>
  <link rel="stylesheet" href="../../css/style.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1>Vacation Savings Planner</h1>
    </div>
  </header>

  <main class="calculator-page">
    <div class="breadcrumb">
      <a href="../../">Home</a> &rsaquo; Vacation Savings Planner
    </div>

    <div class="calc-card">
      <h2>Input Details</h2>
      <form id="vacationForm">
                <div class="form-group">
          <label for="destination">Destination</label>
          <div class="input-wrapper">
            <input type="text" id="destination" placeholder="e.g. Europe" value="Europe">
          </div>
        </div>        <div class="form-group">
          <label for="tripCost">Estimated Trip Cost</label>
          <div class="input-wrapper">
            <input type="number" id="tripCost" placeholder="e.g. 300000" required min="0" step="50000" value="300000">
            <span class="suffix">&#8377;</span>
          </div>
        </div>        <div class="form-group">
          <label for="monthsUntil">Months Until Trip</label>
          <div class="input-wrapper">
            <input type="number" id="monthsUntil" placeholder="e.g. 24" required min="1" step="1" value="24" max="120">
            <span class="suffix">Mos</span>
          </div>
        </div>        <div class="form-group">
          <label for="alreadySavedV">Already Saved</label>
          <div class="input-wrapper">
            <input type="number" id="alreadySavedV" placeholder="e.g. 0" required min="0" step="10000" value="0">
            <span class="suffix">&#8377;</span>
          </div>
        </div>        <div class="form-group">
          <label for="expectedReturnV">Expected Return %</label>
          <div class="input-wrapper">
            <input type="number" id="expectedReturnV" placeholder="e.g. 6" required min="0" step="0.5" value="6">
            <span class="suffix">%</span>
          </div>
        </div>
        <div style="display: flex; gap: 12px; margin-top: 8px;">
          <button type="submit" class="btn btn-primary">Calculate</button>
          <button type="reset" class="btn btn-secondary">Reset</button>
        </div>
      </form>
    </div>

    <div id="resultsSection" class="calc-card" style="display:none;">
      <h2>Results</h2>
      <div class="results-grid">
                <div class="result-item">
          <div class="label">Total Needed</div>
          <div class="value " id="resultTotalNeededV">&#8377; 0</div>
        </div>        <div class="result-item">
          <div class="label">Already Saved</div>
          <div class="value " id="resultSavedV">&#8377; 0</div>
        </div>        <div class="result-item">
          <div class="label">Monthly Savings Required</div>
          <div class="value " id="resultMonthlyV">&#8377; 0</div>
        </div>        <div class="result-item">
          <div class="label">Months to Goal</div>
          <div class="value " id="resultMonthsV">0</div>
        </div>
      </div>

      <div class="chart-container">
        <canvas id="vacationChart" width="300" height="300"></canvas>
      </div>
      
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2026 Money Tools</p>
    </div>
  </footer>

  <script src="../../js/chart-tooltip.js"></script>
  <script src="script.js"></script>
</body>
</html>
