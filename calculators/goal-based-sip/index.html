<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27%3E%3Ctext y=%27.9em%27 font-size=%2790%27 fill=%27%2316a34a%27%3E%24%3C/text%3E%3C/svg%3E">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Goal-based SIP Calculator - Money Tools</title>
  <link rel="stylesheet" href="../../css/style.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1>Goal-based SIP Calculator</h1>
      <p>Find the monthly SIP needed to reach your financial goal.</p>
    </div>
  </header>

  <main class="calculator-page">
    <div class="breadcrumb">
      <a href="../../">Home</a> &rsaquo; Goal-based SIP Calculator
    </div>

    <div class="calc-card">
      <h2>Goal Details</h2>
      <form id="goalSipForm">
        <div class="form-group">
          <label for="goalAmount">Goal Amount</label>
          <div class="input-wrapper">
            <input type="number" id="goalAmount" placeholder="e.g. 10000000" required min="1" value="10000000">
            <span class="suffix">&#8377;</span>
          </div>
        </div>

        <div class="form-group">
          <label for="currentSavings">Current Savings for this Goal</label>
          <div class="input-wrapper">
            <input type="number" id="currentSavings" placeholder="e.g. 0" required min="0" value="0">
            <span class="suffix">&#8377;</span>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="timeHorizon">Time Horizon (Years)</label>
            <div class="input-wrapper">
              <input type="number" id="timeHorizon" placeholder="e.g. 15" required min="1" step="1" value="15">
              <span class="suffix">Yrs</span>
            </div>
          </div>
          <div class="form-group">
            <label for="expectedReturn">Expected Return Rate (p.a.)</label>
            <div class="input-wrapper">
              <input type="number" id="expectedReturn" placeholder="e.g. 12" required min="0" step="0.5" value="12">
              <span class="suffix">%</span>
            </div>
          </div>
        </div>

        <div style="display: flex; gap: 12px; margin-top: 8px;">
          <button type="submit" class="btn btn-primary">Calculate</button>
          <button type="reset" class="btn btn-secondary">Reset</button>
        </div>
      </form>
    </div>

    <div id="resultsSection" class="calc-card" style="display:none;">
      <h2>Goal Summary</h2>
      <div class="results-grid-wide">
        <div class="result-item">
          <div class="label">Monthly SIP Required</div>
          <div class="value success" id="resultMonthlySIP">&#8377; 0</div>
        </div>
        <div class="result-item">
          <div class="label">Goal Amount</div>
          <div class="value" id="resultGoalAmount">&#8377; 0</div>
        </div>
        <div class="result-item">
          <div class="label">Current Savings</div>
          <div class="value" id="resultCurrentSavings">&#8377; 0</div>
        </div>
        <div class="result-item">
          <div class="label">FV of Current Savings</div>
          <div class="value" id="resultFvSavings">&#8377; 0</div>
        </div>
      </div>

      <div class="chart-container">
        <canvas id="goalSipChart" width="300" height="300"></canvas>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2026 Money Tools</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
