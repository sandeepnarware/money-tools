<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27%3E%3Ctext y=%27.9em%27 font-size=%2790%27 fill=%27%2316a34a%27%3E%24%3C/text%3E%3C/svg%3E">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dividend Yield Calculator - Money Tools</title>
  <link rel="stylesheet" href="../../css/style.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1>Dividend Yield Calculator</h1>
      <p>Calculate dividend yield, income, and yield on cost for your stock investments.</p>
    </div>
  </header>

  <main class="calculator-page">
    <div class="breadcrumb">
      <a href="../../">Home</a> &rsaquo; Dividend Yield Calculator
    </div>

    <div class="calc-card">
      <h2>Investment Details</h2>
      <form id="divYieldForm">
        <div class="form-group">
          <label for="stockPrice">Stock Price</label>
          <div class="input-wrapper">
            <input type="number" id="stockPrice" placeholder="e.g. 1500" required min="1" step="100" value="1500">
            <span class="suffix">&#8377;</span>
          </div>
        </div>

        <div class="form-group">
          <label for="annualDividend">Annual Dividend Per Share</label>
          <div class="input-wrapper">
            <input type="number" id="annualDividend" placeholder="e.g. 45" required min="0" step="5" value="45">
            <span class="suffix">&#8377;</span>
          </div>
        </div>

        <div class="form-group">
          <label for="shares">Number of Shares</label>
          <div class="input-wrapper">
            <input type="number" id="shares" placeholder="e.g. 100" required min="1" step="10" value="100">
          </div>
        </div>

        <div class="form-group">
          <label for="purchasePrice">Purchase Price (for Yield on Cost)</label>
          <div class="input-wrapper">
            <input type="number" id="purchasePrice" placeholder="e.g. 1200" min="1" step="100" value="1200">
            <span class="suffix">&#8377;</span>
          </div>
        </div>

        <div style="display: flex; gap: 12px; margin-top: 8px;">
          <button type="submit" class="btn btn-primary">Calculate</button>
          <button type="reset" class="btn btn-secondary">Reset</button>
        </div>
      </form>
    </div>

    <div id="resultsSection" class="calc-card" style="display:none;">
      <h2>Dividend Summary</h2>
      <div class="results-grid results-grid-wide">
        <div class="result-item">
          <div class="label">Dividend Yield</div>
          <div class="value success" id="resultYield">0%</div>
        </div>
        <div class="result-item">
          <div class="label">Annual Dividend Income</div>
          <div class="value" id="resultIncome">&#8377; 0</div>
        </div>
        <div class="result-item">
          <div class="label">Total Investment</div>
          <div class="value" id="resultInvestment">&#8377; 0</div>
        </div>
        <div class="result-item">
          <div class="label">Yield on Cost</div>
          <div class="value primary" id="resultYieldCost">0%</div>
        </div>
      </div>

      <div class="chart-container">
        <canvas id="divYieldChart" width="300" height="300"></canvas>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2026 Money Tools</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
