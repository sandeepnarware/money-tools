<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27%3E%3Ctext y=%27.9em%27 font-size=%2790%27 fill=%27%230369a1%27%3E%24%3C/text%3E%3C/svg%3E">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Car Purchase Planner - Money Tools</title>
  <link rel="stylesheet" href="../../css/style.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1>Car Purchase Planner</h1>
    </div>
  </header>

  <main class="calculator-page">
    <div class="breadcrumb">
      <a href="../../">Home</a> &rsaquo; Car Purchase Planner
    </div>

    <div class="calc-card">
      <h2>Input Details</h2>
      <form id="carPlannerForm">
                <div class="form-group">
          <label for="carPrice">Target Car Price</label>
          <div class="input-wrapper">
            <input type="number" id="carPrice" placeholder="e.g. 1000000" required min="0" step="50000" value="1000000">
            <span class="suffix">&#8377;</span>
          </div>
        </div>        <div class="form-group">
          <label for="downPaymentPctCar">Down Payment %</label>
          <div class="input-wrapper">
            <input type="number" id="downPaymentPctCar" placeholder="e.g. 20" required min="0" step="5" value="20" max="100">
            <span class="suffix">%</span>
          </div>
        </div>        <div class="form-group">
          <label for="alreadySavedCar">Already Saved</label>
          <div class="input-wrapper">
            <input type="number" id="alreadySavedCar" placeholder="e.g. 100000" required min="0" step="50000" value="100000">
            <span class="suffix">&#8377;</span>
          </div>
        </div>        <div class="form-group">
          <label for="monthlyCapacityCar">Monthly Savings Capacity</label>
          <div class="input-wrapper">
            <input type="number" id="monthlyCapacityCar" placeholder="e.g. 15000" required min="0" step="5000" value="15000">
            <span class="suffix">&#8377;</span>
          </div>
        </div>        <div class="form-group">
          <label for="expectedReturnCar">Expected Return %</label>
          <div class="input-wrapper">
            <input type="number" id="expectedReturnCar" placeholder="e.g. 8" required min="0" step="0.5" value="8">
            <span class="suffix">%</span>
          </div>
        </div>        <div class="form-group">
          <label for="targetYearsCar">Target Years</label>
          <div class="input-wrapper">
            <input type="number" id="targetYearsCar" placeholder="e.g. 3" required min="0" step="1" value="3" max="10">
            <span class="suffix">Yrs</span>
          </div>
        </div>
        <div style="display: flex; gap: 12px; margin-top: 8px;">
          <button type="submit" class="btn btn-primary">Calculate</button>
          <button type="reset" class="btn btn-secondary">Reset</button>
        </div>
      </form>
    </div>

    <div id="resultsSection" class="calc-card" style="display:none;">
      <h2>Results</h2>
      <div class="results-grid">
                <div class="result-item">
          <div class="label">Down Payment Required</div>
          <div class="value " id="resultDownCar">&#8377; 0</div>
        </div>        <div class="result-item">
          <div class="label">Already Saved</div>
          <div class="value " id="resultSavedCar">&#8377; 0</div>
        </div>        <div class="result-item">
          <div class="label">Monthly Savings Needed</div>
          <div class="value " id="resultMonthlyCar">&#8377; 0</div>
        </div>        <div class="result-item">
          <div class="label">Will Reach Goal?</div>
          <div class="value " id="resultReachCar">0</div>
        </div>        <div class="result-item">
          <div class="label">Total Saved at Target</div>
          <div class="value " id="resultTotalSavedCar">&#8377; 0</div>
        </div>
      </div>

      <div class="chart-container">
        <canvas id="carPlannerChart" width="300" height="300"></canvas>
      </div>
      
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2026 Money Tools</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
