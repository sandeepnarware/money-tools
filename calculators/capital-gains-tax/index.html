<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27%3E%3Ctext y=%27.9em%27 font-size=%2790%27 fill=%27%2316a34a%27%3E%24%3C/text%3E%3C/svg%3E">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Capital Gains Tax Calculator - Money Tools</title>
  <link rel="stylesheet" href="../../css/style.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1>Capital Gains Tax Calculator</h1>
      <p>Calculate tax on capital gains from equity, debt & property.</p>
    </div>
  </header>
  <main class="calculator-page">
    <div class="breadcrumb">
      <a href="../../">Home</a> &rsaquo; Capital Gains Tax Calculator
    </div>
    <div class="calc-card">
      <h2>Asset Details</h2>
      <form id="capitalGainsForm">
        <div class="form-group">
          <label for="assetType">Asset Type</label>
          <select id="assetType" style="width:100%; padding:10px 12px; font-size:1rem; border:1px solid var(--border); border-radius:6px; background:var(--surface); color:var(--text); outline:none; cursor:pointer;">
            <option value="equity">Equity</option>
            <option value="debt">Debt</option>
            <option value="realestate">Real Estate</option>
          </select>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="purchasePrice">Purchase Price</label>
            <div class="input-wrapper">
              <input type="number" id="purchasePrice" required min="0" step="10000" value="100000">
              <span class="suffix">&#8377;</span>
            </div>
          </div>
          <div class="form-group">
            <label for="salePrice">Sale Price</label>
            <div class="input-wrapper">
              <input type="number" id="salePrice" required min="0" step="10000" value="200000">
              <span class="suffix">&#8377;</span>
            </div>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="purchaseYear">Purchase Year</label>
            <div class="input-wrapper">
              <input type="number" id="purchaseYear" required min="1980" max="2026" step="1" value="2020">
              <span class="suffix"></span>
            </div>
          </div>
          <div class="form-group">
            <label for="saleYear">Sale Year</label>
            <div class="input-wrapper">
              <input type="number" id="saleYear" required min="1980" max="2026" step="1" value="2026">
              <span class="suffix"></span>
            </div>
          </div>
        </div>
        <div class="form-group">
          <label for="exemptionLimit">LTCG Exemption Limit (Equity)</label>
          <div class="input-wrapper">
            <input type="number" id="exemptionLimit" required min="0" step="10000" value="100000">
            <span class="suffix">&#8377;</span>
          </div>
        </div>
        <div class="form-group" style="display:flex; align-items:center; gap:8px;">
          <input type="checkbox" id="highTaxBracket" style="width:18px; height:18px; cursor:pointer;">
          <label for="highTaxBracket" style="margin-bottom:0; cursor:pointer;">I am in the 30% income tax slab (relevant for debt/real estate STCG)</label>
        </div>
        <div style="display: flex; gap: 12px; margin-top: 8px;">
          <button type="submit" class="btn btn-primary">Calculate</button>
          <button type="reset" class="btn btn-secondary">Reset</button>
        </div>
      </form>
    </div>
    <div id="resultsSection" class="calc-card" style="display:none;">
      <h2>Capital Gains Summary</h2>
      <div class="results-grid results-grid-wide" id="resultGrid">
        <div class="result-item">
          <div class="label">Holding Period</div>
          <div class="value" id="resultHoldingPeriod">0 years</div>
        </div>
        <div class="result-item">
          <div class="label">Gain Type</div>
          <div class="value" id="resultGainType">-</div>
        </div>
        <div class="result-item">
          <div class="label">Total Capital Gain</div>
          <div class="value primary" id="resultTotalGain">&#8377; 0</div>
        </div>
        <div class="result-item">
          <div class="label">Taxable Gain</div>
          <div class="value" id="resultTaxableGain">&#8377; 0</div>
        </div>
        <div class="result-item">
          <div class="label">Tax Amount</div>
          <div class="value success" id="resultTaxAmount">&#8377; 0</div>
        </div>
      </div>
      <div class="chart-container-wide">
        <canvas id="capitalGainsChart" width="500" height="300"></canvas>
      </div>
    </div>
  </main>
  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2026 Money Tools</p>
    </div>
  </footer>
  <script src="script.js"></script>
</body>
</html>
