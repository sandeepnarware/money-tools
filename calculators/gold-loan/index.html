<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27%3E%3Ctext y=%27.9em%27 font-size=%2790%27 fill=%27%230369a1%27%3E%24%3C/text%3E%3C/svg%3E">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gold Loan Calculator - Money Tools</title>
  <link rel="stylesheet" href="../../css/style.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1>Gold Loan Calculator</h1>
      <p>Calculate loan amount, EMI, and total payment for gold loans.</p>
    </div>
  </header>

  <main class="calculator-page">
    <div class="breadcrumb">
      <a href="../../">Home</a> &rsaquo; Gold Loan Calculator
    </div>

    <div class="calc-card">
      <h2>Loan Details</h2>
      <form id="goldLoanForm">
        <div class="form-row">
          <div class="form-group">
            <label for="goldWeight">Gold Weight (grams)</label>
            <div class="input-wrapper">
              <input type="number" id="goldWeight" placeholder="e.g. 20" required min="1" step="5" value="20">
              <span class="suffix">g</span>
            </div>
          </div>
          <div class="form-group">
            <label for="goldRate">Gold Rate Per Gram</label>
            <div class="input-wrapper">
              <input type="number" id="goldRate" placeholder="e.g. 6000" required min="1" step="100" value="6000">
              <span class="suffix">&#8377;</span>
            </div>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="loanLtv">Loan-to-Value %</label>
            <div class="input-wrapper">
              <input type="number" id="loanLtv" placeholder="e.g. 75" required min="50" max="90" step="1" value="75">
              <span class="suffix">%</span>
            </div>
          </div>
          <div class="form-group">
            <label for="loanInterest">Interest Rate</label>
            <div class="input-wrapper">
              <input type="number" id="loanInterest" placeholder="e.g. 12" required min="0" step="0.5" value="12">
              <span class="suffix">%</span>
            </div>
          </div>
        </div>

        <div class="form-group">
          <label for="loanTenure">Tenure (Months)</label>
          <div class="input-wrapper">
            <input type="number" id="loanTenure" placeholder="e.g. 12" required min="1" max="36" step="1" value="12">
            <span class="suffix">Months</span>
          </div>
        </div>

        <div style="display: flex; gap: 12px; margin-top: 8px;">
          <button type="submit" class="btn btn-primary">Calculate</button>
          <button type="reset" class="btn btn-secondary">Reset</button>
        </div>
      </form>
    </div>

    <div id="resultsSection" class="calc-card" style="display:none;">
      <h2>Loan Summary</h2>
      <div class="results-grid">
        <div class="result-item">
          <div class="label">Gold Value</div>
          <div class="value" id="resultGoldValue">&#8377; 0</div>
        </div>
        <div class="result-item">
          <div class="label">Loan Amount</div>
          <div class="value primary" id="resultLoanAmt">&#8377; 0</div>
        </div>
        <div class="result-item">
          <div class="label">EMI</div>
          <div class="value" id="resultLoanEmi">&#8377; 0</div>
        </div>
        <div class="result-item">
          <div class="label">Total Interest</div>
          <div class="value" id="resultLoanInterest">&#8377; 0</div>
        </div>
        <div class="result-item">
          <div class="label">Total Payment</div>
          <div class="value" id="resultLoanPayment">&#8377; 0</div>
        </div>
      </div>

      <div class="chart-container">
        <canvas id="goldLoanChart" width="300" height="300"></canvas>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2026 Money Tools</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
