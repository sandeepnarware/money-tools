<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27%3E%3Ctext y=%27.9em%27 font-size=%2790%27 fill=%27%2316a34a%27%3E%24%3C/text%3E%3C/svg%3E">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HUF Tax Benefit Calculator - Money Tools</title>
  <link rel="stylesheet" href="../../css/style.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1>HUF Tax Benefit Calculator</h1>
      <p>Compare tax liability with and without forming an HUF.</p>
    </div>
  </header>

  <main class="calculator-page">
    <div class="breadcrumb">
      <a href="../../">Home</a> &rsaquo; HUF Tax Benefit Calculator
    </div>

    <div class="calc-card">
      <h2>Income Details</h2>
      <form id="hufForm">
        <div class="form-row">
          <div class="form-group">
            <label for="hufIncome">HUF Annual Income</label>
            <div class="input-wrapper">
              <input type="number" id="hufIncome" required min="0" step="50000" value="300000">
              <span class="suffix">&#8377;</span>
            </div>
          </div>
          <div class="form-group">
            <label for="individualIncome">Individual Annual Income</label>
            <div class="input-wrapper">
              <input type="number" id="individualIncome" required min="0" step="100000" value="900000">
              <span class="suffix">&#8377;</span>
            </div>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="hufDeductions">HUF Deductions (80C, etc.)</label>
            <div class="input-wrapper">
              <input type="number" id="hufDeductions" required min="0" step="10000" value="50000">
              <span class="suffix">&#8377;</span>
            </div>
          </div>
          <div class="form-group">
            <label for="individualDeductions">Individual Deductions</label>
            <div class="input-wrapper">
              <input type="number" id="individualDeductions" required min="0" step="10000" value="150000">
              <span class="suffix">&#8377;</span>
            </div>
          </div>
        </div>

        <div style="display: flex; gap: 12px; margin-top: 8px;">
          <button type="submit" class="btn btn-primary">Calculate</button>
          <button type="reset" class="btn btn-secondary">Reset</button>
        </div>
      </form>
    </div>

    <div id="resultsSection" class="calc-card" style="display:none;">
      <h2>Tax Comparison</h2>
      <div class="results-grid">
        <div class="result-item">
          <div class="label">Individual Tax Without HUF</div>
          <div class="value" id="resultTaxWithout">&#8377; 0</div>
        </div>
        <div class="result-item">
          <div class="label">Individual Tax With HUF</div>
          <div class="value" id="resultIndivWith">&#8377; 0</div>
        </div>
        <div class="result-item">
          <div class="label">HUF Tax</div>
          <div class="value" id="resultHufTax">&#8377; 0</div>
        </div>
        <div class="result-item">
          <div class="label">Total Tax With HUF</div>
          <div class="value" id="resultTotalWith">&#8377; 0</div>
        </div>
        <div class="result-item">
          <div class="label">Tax Saved</div>
          <div class="value primary" id="resultSaved">&#8377; 0</div>
        </div>
      </div>

      <div class="chart-container">
        <canvas id="hufChart" width="300" height="300"></canvas>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2026 Money Tools</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
