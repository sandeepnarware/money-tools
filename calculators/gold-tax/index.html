<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27%3E%3Ctext y=%27.9em%27 font-size=%2790%27 fill=%27%230369a1%27%3E%24%3C/text%3E%3C/svg%3E">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gold Tax Calculator - Money Tools</title>
  <link rel="stylesheet" href="../../css/style.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1>Gold Tax Calculator</h1>
      <p>Calculate capital gains tax on your gold investments.</p>
    </div>
  </header>

  <main class="calculator-page">
    <div class="breadcrumb">
      <a href="../../">Home</a> &rsaquo; Gold Tax Calculator
    </div>

    <div class="calc-card">
      <h2>Gold Investment Details</h2>
      <form id="goldTaxForm">
        <div class="form-row">
          <div class="form-group">
            <label for="goldPurchasePrice">Purchase Price</label>
            <div class="input-wrapper">
              <input type="number" id="goldPurchasePrice" required min="1" step="50000" value="500000">
              <span class="suffix">&#8377;</span>
            </div>
          </div>
          <div class="form-group">
            <label for="goldSalePrice">Sale Price</label>
            <div class="input-wrapper">
              <input type="number" id="goldSalePrice" required min="0" step="50000" value="800000">
              <span class="suffix">&#8377;</span>
            </div>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="goldPurchaseYear">Purchase Year</label>
            <div class="input-wrapper">
              <select id="goldPurchaseYear" style="width:100%; padding:8px; border:1px solid #d1d5db; border-radius:6px;"></select>
            </div>
          </div>
          <div class="form-group">
            <label for="goldSaleYear">Sale Year</label>
            <div class="input-wrapper">
              <select id="goldSaleYear" style="width:100%; padding:8px; border:1px solid #d1d5db; border-radius:6px;"></select>
            </div>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="goldType">Type of Gold</label>
            <div class="input-wrapper">
              <select id="goldType" style="width:100%; padding:8px; border:1px solid #d1d5db; border-radius:6px;">
                <option value="Physical">Physical</option>
                <option value="ETF">ETF</option>
                <option value="SGB">Sovereign Gold Bond</option>
              </select>
            </div>
          </div>
          <div class="form-group" style="display:flex; align-items:flex-end; padding-bottom:8px;">
            <label style="display:flex; align-items:center; gap:8px; cursor:pointer;">
              <input type="checkbox" id="gold30Bracket" checked>
              In 30% tax bracket?
            </label>
          </div>
        </div>

        <div style="display: flex; gap: 12px; margin-top: 8px;">
          <button type="submit" class="btn btn-primary">Calculate</button>
          <button type="reset" class="btn btn-secondary">Reset</button>
        </div>
      </form>
    </div>

    <div id="resultsSection" class="calc-card" style="display:none;">
      <h2>Tax Summary</h2>
      <div class="results-grid">
        <div class="result-item">
          <div class="label">Holding Period</div>
          <div class="value" id="resultHoldingPeriod">0 years</div>
        </div>
        <div class="result-item">
          <div class="label">Total Capital Gain</div>
          <div class="value" id="resultCapitalGain">&#8377; 0</div>
        </div>
        <div class="result-item">
          <div class="label">Gain Type</div>
          <div class="value" id="resultGainType">--</div>
        </div>
        <div class="result-item">
          <div class="label">Taxable Gain</div>
          <div class="value" id="resultTaxableGain">&#8377; 0</div>
        </div>
        <div class="result-item">
          <div class="label">Tax Amount</div>
          <div class="value" id="resultTaxAmount">&#8377; 0</div>
        </div>
      </div>

      <div class="chart-container">
        <canvas id="goldTaxChart" width="300" height="300"></canvas>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2026 Money Tools</p>
    </div>
  </footer>

  <script src="../../js/chart-tooltip.js"></script>
  <script src="script.js"></script>
</body>
</html>
