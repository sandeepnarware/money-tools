<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27%3E%3Ctext y=%27.9em%27 font-size=%2790%27 fill=%27%2316a34a%27%3E%24%3C/text%3E%3C/svg%3E">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PPP Salary Comparison - Money Tools</title>
  <link rel="stylesheet" href="../../css/style.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1>PPP Salary Comparison</h1>
    </div>
  </header>

  <main class="calculator-page">
    <div class="breadcrumb">
      <a href="../../">Home</a> &rsaquo; PPP Salary Comparison
    </div>

    <div class="calc-card">
      <h2>Input Details</h2>
      <form id="pppForm">
                <div class="form-group">
          <label for="salaryIndia">Your Salary in India</label>
          <div class="input-wrapper">
            <input type="number" id="salaryIndia" placeholder="e.g. 1200000" required min="0" step="100000" value="1200000">
            <span class="suffix">&#8377;</span>
          </div>
        </div>        <div class="form-group">
          <label for="targetCountry">Target Country</label>
          <div class="input-wrapper">
            <select id="targetCountry">
              <option value="USA" selected>USA</option>
              <option value="UK">UK</option>
              <option value="Canada">Canada</option>
              <option value="Australia">Australia</option>
              <option value="UAE">UAE</option>
              <option value="Singapore">Singapore</option>
              <option value="Germany">Germany</option>
              <option value="Japan">Japan</option>
            </select>
          </div>
        </div>
        <div style="display: flex; gap: 12px; margin-top: 8px;">
          <button type="submit" class="btn btn-primary">Calculate</button>
          <button type="reset" class="btn btn-secondary">Reset</button>
        </div>
      </form>
    </div>

    <div id="resultsSection" class="calc-card" style="display:none;">
      <h2>Results</h2>
      <div class="results-grid">
                <div class="result-item">
          <div class="label">Your Salary (INR)</div>
          <div class="value " id="resultSalaryINR">&#8377; 0</div>
        </div>        <div class="result-item">
          <div class="label">PPP Conversion Factor</div>
          <div class="value " id="resultPPPFactor">0</div>
        </div>        <div class="result-item">
          <div class="label">Equivalent Salary (Target Country)</div>
          <div class="value " id="resultEquivSalary">&#8377; 0</div>
        </div>        <div class="result-item">
          <div class="label">PPP Adjusted Salary</div>
          <div class="value " id="resultPPPAdj">&#8377; 0</div>
        </div>        <div class="result-item">
          <div class="label">Salary Difference %</div>
          <div class="value " id="resultDiff">0</div>
        </div>
      </div>

      <div class="chart-container-wide">
        <canvas id="pppChart" width="300" height="300"></canvas>
      </div>
      
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2026 Money Tools</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
