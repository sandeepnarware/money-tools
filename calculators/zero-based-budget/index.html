<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27%3E%3Ctext y=%27.9em%27 font-size=%2790%27 fill=%27%230369a1%27%3E%24%3C/text%3E%3C/svg%3E">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zero-Based Budget Planner - Money Tools</title>
  <link rel="stylesheet" href="../../css/style.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1>Zero-Based Budget Planner</h1>
    </div>
  </header>

  <main class="calculator-page">
    <div class="breadcrumb">
      <a href="../../">Home</a> &rsaquo; Zero-Based Budget Planner
    </div>

    <div class="calc-card">
      <h2>Input Details</h2>
      <form id="zbbForm">
                <div class="form-group">
          <label for="monthlyIncome">Monthly Income</label>
          <div class="input-wrapper">
            <input type="number" id="monthlyIncome" placeholder="e.g. 60000" required min="0" step="5000" value="60000">
            <span class="suffix">&#8377;</span>
          </div>
        </div>
        <div class="form-group">
          <label for="housingExpense">Housing</label>
          <div class="input-wrapper">
            <input type="number" id="housingExpense" placeholder="e.g. 15000" required min="0" step="1000" value="15000">
            <span class="suffix">&#8377;</span>
          </div>
        </div>
        <div class="form-group">
          <label for="foodExpense">Food</label>
          <div class="input-wrapper">
            <input type="number" id="foodExpense" placeholder="e.g. 8000" required min="0" step="1000" value="8000">
            <span class="suffix">&#8377;</span>
          </div>
        </div>
        <div class="form-group">
          <label for="transportExpense">Transport</label>
          <div class="input-wrapper">
            <input type="number" id="transportExpense" placeholder="e.g. 5000" required min="0" step="1000" value="5000">
            <span class="suffix">&#8377;</span>
          </div>
        </div>
        <div class="form-group">
          <label for="utilitiesExpense">Utilities</label>
          <div class="input-wrapper">
            <input type="number" id="utilitiesExpense" placeholder="e.g. 3000" required min="0" step="1000" value="3000">
            <span class="suffix">&#8377;</span>
          </div>
        </div>
        <div class="form-group">
          <label for="insuranceExpense">Insurance</label>
          <div class="input-wrapper">
            <input type="number" id="insuranceExpense" placeholder="e.g. 2000" required min="0" step="1000" value="2000">
            <span class="suffix">&#8377;</span>
          </div>
        </div>
        <div class="form-group">
          <label for="debtExpense">Debt Payments</label>
          <div class="input-wrapper">
            <input type="number" id="debtExpense" placeholder="e.g. 5000" required min="0" step="1000" value="5000">
            <span class="suffix">&#8377;</span>
          </div>
        </div>
        <div class="form-group">
          <label for="savingsExpense">Savings</label>
          <div class="input-wrapper">
            <input type="number" id="savingsExpense" placeholder="e.g. 10000" required min="0" step="1000" value="10000">
            <span class="suffix">&#8377;</span>
          </div>
        </div>
        <div class="form-group">
          <label for="miscExpense">Miscellaneous</label>
          <div class="input-wrapper">
            <input type="number" id="miscExpense" placeholder="e.g. 5000" required min="0" step="1000" value="5000">
            <span class="suffix">&#8377;</span>
          </div>
        </div>

        <div style="display: flex; gap: 12px; margin-top: 8px;">
          <button type="submit" class="btn btn-primary">Calculate</button>
          <button type="reset" class="btn btn-secondary">Reset</button>
        </div>
      </form>
    </div>

    <div id="resultsSection" class="calc-card" style="display:none;">
      <h2>Results</h2>
      <div class="results-grid">
                <div class="result-item">
          <div class="label">Total Income</div>
          <div class="value " id="resultIncome">&#8377; 0</div>
        </div>        <div class="result-item">
          <div class="label">Total Allocated</div>
          <div class="value " id="resultAllocated">&#8377; 0</div>
        </div>        <div class="result-item">
          <div class="label">Remaining</div>
          <div class="value " id="resultRemaining">0</div>
        </div>        <div class="result-item">
          <div class="label">Housing %</div>
          <div class="value " id="resultHousingPct">0</div>
        </div>        <div class="result-item">
          <div class="label">Food %</div>
          <div class="value " id="resultFoodPct">0</div>
        </div>        <div class="result-item">
          <div class="label">Savings %</div>
          <div class="value " id="resultSavingsPct">0</div>
        </div>
      </div>

      <div class="chart-container">
        <canvas id="zbbChart" width="300" height="300"></canvas>
      </div>
            <h2 style="font-size:1rem; margin-bottom:12px;">Details</h2>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Category</th>
              <th class="text-right">Amount</th>
              <th class="text-right">% of Income</th>
            </tr>
          </thead>
          <tbody id="budgetTableBody"></tbody>
        </table>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2026 Money Tools</p>
    </div>
  </footer>

  <script src="../../js/chart-tooltip.js"></script>
  <script src="script.js"></script>
</body>
</html>
