<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27%3E%3Ctext y=%27.9em%27 font-size=%2790%27 fill=%27%230369a1%27%3E%24%3C/text%3E%3C/svg%3E">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PPF vs FD Calculator - Money Tools</title>
  <link rel="stylesheet" href="../../css/style.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1>PPF vs FD Calculator</h1>
      <p>Compare the maturity value of PPF and Fixed Deposit investments.</p>
    </div>
  </header>

  <main class="calculator-page">
    <div class="breadcrumb">
      <a href="../../">Home</a> &rsaquo; PPF vs FD
    </div>

    <div class="calc-card">
      <h2>Investment Details</h2>
      <form id="ppvsfdForm">
        <div class="form-group">
          <label for="ppfAnnual">Annual Investment</label>
          <div class="input-wrapper">
             <input type="number" id="ppfAnnual" placeholder="e.g. 50000" required min="1" max="150000" value="50000">
            <span class="suffix">&#8377;</span>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="ppfRate">PPF Rate</label>
            <div class="input-wrapper">
              <input type="number" id="ppfRate" placeholder="e.g. 7.1" required min="0" step="0.1" value="7.1">
              <span class="suffix">%</span>
            </div>
          </div>
          <div class="form-group">
            <label for="fdRate">FD Rate</label>
            <div class="input-wrapper">
              <input type="number" id="fdRate" placeholder="e.g. 7" required min="0" step="0.1" value="7">
              <span class="suffix">%</span>
            </div>
          </div>
        </div>

        <div class="form-group">
          <label for="ppfPeriod">Investment Period (Years)</label>
          <div class="input-wrapper">
             <input type="number" id="ppfPeriod" placeholder="e.g. 15" required min="1" step="1" value="15">
            <span class="suffix">Yrs</span>
          </div>
        </div>

        <div style="display: flex; gap: 12px; margin-top: 8px;">
          <button type="submit" class="btn btn-primary">Calculate</button>
          <button type="reset" class="btn btn-secondary">Reset</button>
        </div>
      </form>
    </div>

    <div id="resultsSection" class="calc-card" style="display:none;">
      <h2>Comparison Summary</h2>
      <div class="results-grid">
        <div class="result-item">
          <div class="label">PPF Maturity</div>
          <div class="value primary" id="resultPpfMaturity">&#8377; 0</div>
        </div>
        <div class="result-item">
          <div class="label">FD Maturity</div>
          <div class="value primary" id="resultFdMaturity">&#8377; 0</div>
        </div>
        <div class="result-item">
          <div class="label">Difference</div>
          <div class="value" id="resultPpfDiff">&#8377; 0</div>
        </div>
        <div class="result-item">
          <div class="label">PPF Returns</div>
          <div class="value success" id="resultPpfReturns">&#8377; 0</div>
        </div>
        <div class="result-item">
          <div class="label">FD Returns</div>
          <div class="value success" id="resultFdReturns">&#8377; 0</div>
        </div>
        <div class="result-item">
          <div class="label">Better Option</div>
          <div class="value" id="resultBetterPpf">-</div>
        </div>
      </div>

      <div class="chart-container chart-container-wide">
        <canvas id="ppvsfdChart" width="500" height="300"></canvas>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2026 Money Tools</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
