<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27%3E%3Ctext y=%27.9em%27 font-size=%2790%27 fill=%27%2316a34a%27%3E%24%3C/text%3E%3C/svg%3E">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lump Sum vs SIP Calculator - Money Tools</title>
  <link rel="stylesheet" href="../../css/style.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1>Lump Sum vs SIP Calculator</h1>
      <p>Compare lump sum and systematic investment plan returns.</p>
    </div>
  </header>

  <main class="calculator-page">
    <div class="breadcrumb">
      <a href="../../">Home</a> &rsaquo; Lump Sum vs SIP
    </div>

    <div class="calc-card">
      <h2>Investment Details</h2>
      <form id="lumpsumVsSipForm">
        <div class="form-group">
          <label for="lsTotal">Total Amount to Invest</label>
          <div class="input-wrapper">
            <input type="number" id="lsTotal" placeholder="e.g. 1200000" required min="1" value="1200000">
            <span class="suffix">&#8377;</span>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="lsPeriod">Period (Years)</label>
            <div class="input-wrapper">
              <input type="number" id="lsPeriod" placeholder="e.g. 10" required min="1" step="1" value="10">
              <span class="suffix">Yrs</span>
            </div>
          </div>
          <div class="form-group">
            <label for="lsReturn">Expected Return</label>
            <div class="input-wrapper">
              <input type="number" id="lsReturn" placeholder="e.g. 12" required min="0" step="0.5" value="12">
              <span class="suffix">%</span>
            </div>
          </div>
        </div>

        <div style="display: flex; gap: 12px; margin-top: 8px;">
          <button type="submit" class="btn btn-primary">Calculate</button>
          <button type="reset" class="btn btn-secondary">Reset</button>
        </div>
      </form>
    </div>

    <div id="resultsSection" class="calc-card" style="display:none;">
      <h2>Comparison Summary</h2>
      <div class="results-grid">
        <div class="result-item">
          <div class="label">Invested Amount</div>
          <div class="value" id="resultLsInvested">&#8377; 0</div>
        </div>
        <div class="result-item">
          <div class="label">Lump Sum Final Value</div>
          <div class="value primary" id="resultLsLumpsum">&#8377; 0</div>
        </div>
        <div class="result-item">
          <div class="label">SIP Final Value</div>
          <div class="value primary" id="resultLsSip">&#8377; 0</div>
        </div>
        <div class="result-item">
          <div class="label">Lump Sum Returns</div>
          <div class="value success" id="resultLsLumpsumRet">&#8377; 0</div>
        </div>
        <div class="result-item">
          <div class="label">SIP Returns</div>
          <div class="value success" id="resultLsSipRet">&#8377; 0</div>
        </div>
        <div class="result-item">
          <div class="label">Better Option</div>
          <div class="value" id="resultLsBetter">-</div>
        </div>
      </div>

      <div class="chart-container chart-container-wide">
        <canvas id="lumpsumVsSipChart" width="500" height="300"></canvas>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2026 Money Tools</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
