<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27%3E%3Ctext y=%27.9em%27 font-size=%2790%27 fill=%27%2316a34a%27%3E%24%3C/text%3E%3C/svg%3E">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Currency Converter - Money Tools</title>
  <link rel="stylesheet" href="../../css/style.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1>Currency Converter</h1>
      <p>Convert between major world currencies using live-equivalent rates.</p>
    </div>
  </header>

  <main class="calculator-page">
    <div class="breadcrumb">
      <a href="../../">Home</a> &rsaquo; Currency Converter
    </div>

    <div class="calc-card">
      <h2>Conversion Details</h2>
      <form id="currencyForm">
        <div class="form-group">
          <label for="convAmount">Amount</label>
          <div class="input-wrapper">
            <input type="number" id="convAmount" placeholder="e.g. 10000" required min="1" step="1000" value="10000">
            <span class="suffix">&#8377;</span>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="fromCurrency">From Currency</label>
            <select id="fromCurrency">
              <option value="INR" selected>INR - Indian Rupee</option>
              <option value="USD">USD - US Dollar</option>
              <option value="EUR">EUR - Euro</option>
              <option value="GBP">GBP - British Pound</option>
              <option value="JPY">JPY - Japanese Yen</option>
              <option value="AUD">AUD - Australian Dollar</option>
              <option value="CAD">CAD - Canadian Dollar</option>
              <option value="SGD">SGD - Singapore Dollar</option>
              <option value="AED">AED - UAE Dirham</option>
            </select>
          </div>
          <div class="form-group">
            <label for="toCurrency">To Currency</label>
            <select id="toCurrency">
              <option value="INR">INR - Indian Rupee</option>
              <option value="USD" selected>USD - US Dollar</option>
              <option value="EUR">EUR - Euro</option>
              <option value="GBP">GBP - British Pound</option>
              <option value="JPY">JPY - Japanese Yen</option>
              <option value="AUD">AUD - Australian Dollar</option>
              <option value="CAD">CAD - Canadian Dollar</option>
              <option value="SGD">SGD - Singapore Dollar</option>
              <option value="AED">AED - UAE Dirham</option>
            </select>
          </div>
        </div>

        <div style="display: flex; gap: 12px; margin-top: 8px;">
          <button type="submit" class="btn btn-primary">Convert</button>
          <button type="reset" class="btn btn-secondary">Reset</button>
        </div>
      </form>
    </div>

    <div id="resultsSection" class="calc-card" style="display:none;">
      <h2>Conversion Result</h2>
      <div class="results-grid results-grid-wide">
        <div class="result-item">
          <div class="label">Amount (From)</div>
          <div class="value" id="resultFromAmt">0</div>
        </div>
        <div class="result-item">
          <div class="label">Exchange Rate</div>
          <div class="value" id="resultRate">0</div>
        </div>
        <div class="result-item">
          <div class="label">Converted Amount</div>
          <div class="value primary" id="resultConverted">0</div>
        </div>
        <div class="result-item">
          <div class="label">Last Updated</div>
          <div class="value" id="resultUpdated">-</div>
        </div>
      </div>

      <div class="chart-container">
        <canvas id="currencyChart" width="300" height="300"></canvas>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2026 Money Tools</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
