<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27%3E%3Ctext y=%27.9em%27 font-size=%2790%27 fill=%27%2316a34a%27%3E%24%3C/text%3E%3C/svg%3E">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Money Tools - Personal Finance Calculators</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1>Money Tools</h1>
      <p>Personal finance calculators to help you make smarter money decisions.</p>
    </div>
  </header>

  <main class="container">
    <nav class="category-tabs" id="categoryTabs"></nav>
    <section class="tools-grid" id="toolsGrid">
      <!-- Cards are injected by JS -->
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2026 Money Tools &middot; <span id="visitCount">—</span> visits</p>
    </div>
  </footer>

  <script src="js/main.js"></script>
  <script>
    fetch('https://api.counterapi.dev/v1/money-tools/visits/up')
      .then(r => r.json())
      .then(d => { document.getElementById('visitCount').textContent = d.count.toLocaleString('en-IN'); })
      .catch(() => { document.getElementById('visitCount').textContent = '?'; });
  </script>
</body>
</html>
